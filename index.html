<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control QR Tráfico</title>

  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 12px;
      background: #f4f4f4;
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.18);
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 10px;
    }

    select,
    input,
    textarea,
    button {
      width: 100%;
      box-sizing: border-box;
      font-size: 17px;
      padding: 12px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #1a73e8;
      color: white;
    }

    .btn-ok {
      background: #188038;
      color: white;
    }

    .btn-warn {
      background: #f9ab00;
      color: black;
    }

    .btn-danger {
      background: #d93025;
      color: white;
    }

    .btn-gray {
      background: #5f6368;
      color: white;
    }

    .dato {
      margin: 6px 0;
      font-size: 16px;
    }

    .titulo-hr {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .ok {
      color: #188038;
      font-weight: bold;
    }

    .error {
      color: #d93025;
      font-weight: bold;
    }

    .alerta {
      color: #f57c00;
      font-weight: bold;
      margin-top: 6px;
    }

    #reader {
      width: 100%;
      background: white;
    }

    .hidden {
      display: none;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 12px 0;
    }

    .small {
      font-size: 13px;
      color: #555;
      margin-top: 6px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      padding: 12px;
      border: 2px solid #ccc;
      border-radius: 12px;
      background: #f8f9fa;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }

    .checkbox-row input {
      width: 24px;
      height: 24px;
      margin: 0;
      flex: 0 0 auto;
    }

    .checkbox-row span {
      flex: 1;
    }

    .checkbox-row.activo {
      border-color: #d93025;
      background: #fce8e6;
      color: #b3261e;
    }
    
  </style>
</head>

<body>

  <h2>Control QR Tráfico</h2>

  <div class="card">
    <label>Modo</label>
    <select id="modo" onchange="actualizarModo()">
      <option value="SALIDA">SALIDA</option>
      <option value="RETORNO">RETORNO PAPEL</option>
      <option value="CANCELAR_SALIDA">CANCELAR SALIDA</option>
      <option value="INCIDENCIA">INCIDENCIA</option>
    </select>

    <button class="btn-primary" onclick="iniciarScanner()">Escanear QR</button>
    <button class="btn-gray" onclick="detenerScanner()">Detener cámara</button>

    <div class="small">
      El QR debe contener solo el TokenQR. Si falla el escaneo, podés buscar manualmente por HR o TokenQR.
    </div>
  </div>

  <div class="card">
    <div id="reader"></div>
  </div>

  <div class="card">
    <label>Buscar manualmente</label>
    <input id="busquedaManual" placeholder="Escribir HR o TokenQR">
    <button class="btn-primary" onclick="buscarManual()">Buscar</button>
  </div>

  <div class="card hidden" id="cardDatos">
    <div class="titulo-hr">HR: <span id="hr"></span></div>

    <div class="dato"><b>Chofer planificado:</b> <span id="choferPlanificado"></span></div>
    <div class="dato"><b>Vuelta planificada:</b> <span id="vueltaPlanificada"></span></div>

    <hr>

    <div class="dato"><b>Estado actual:</b> <span id="estadoActual"></span></div>
    <div class="dato"><b>Chofer salida:</b> <span id="choferSalida"></span></div>
    <div class="dato"><b>Vuelta salida:</b> <span id="vueltaSalida"></span></div>
    <div class="dato"><b>Hora salida:</b> <span id="horaSalida"></span></div>
    <div class="dato"><b>Hora retorno:</b> <span id="horaRetorno"></span></div>
    <div class="dato"><b>Estado retorno:</b> <span id="estadoRetorno"></span></div>

    <div id="alertas"></div>

    <div id="panelSalida">
      <hr>

      <label>HR</label>
      <input id="hrSalida" placeholder="Número de hoja de ruta">

      <label>Chofer real de salida</label>
      <select id="choferReal"></select>

      <label>Vuelta real</label>
      <select id="vueltaReal"></select>

      <label class="checkbox-row" id="boxLargaDistancia">
        <input type="checkbox" id="largaDistanciaSalida">
        <span>VIAJE DE LARGA DISTANCIA</span>
      </label>

      <label>Observación salida</label>
      <textarea id="observacionSalida" rows="3" placeholder="Opcional"></textarea>

      <button id="btnConfirmarSalida" class="btn-ok" onclick="confirmarSalida()">Confirmar salida</button>
    </div>

    <div id="panelRetorno" class="hidden">
      <hr>
      <label>Estado del retorno</label>
      <select id="estadoRetornoInput"></select>

      <label>Observación retorno</label>
      <textarea id="observacionRetorno" rows="3" placeholder="Opcional"></textarea>

      <button class="btn-ok" onclick="confirmarRetorno()">Confirmar retorno</button>
    </div>

    <div id="panelCancelarSalida" class="hidden">
      <hr>
      <label>Motivo de cancelación de salida</label>
      <textarea id="observacionCancelarSalida" rows="3" placeholder="Ejemplo: sin stock, material roto, no entra en el camión, se reprograma"></textarea>

      <button class="btn-danger" onclick="confirmarCancelarSalida()">Cancelar salida</button>
    </div>

    <div id="panelIncidencia" class="hidden">
      <hr>
      <label>Observación de incidencia</label>
      <textarea id="observacionIncidencia" rows="3" placeholder="Ejemplo: no volvió el papel, lo trajo otro chofer, papel incompleto"></textarea>

      <button class="btn-danger" onclick="confirmarIncidencia()">Registrar incidencia</button>
    </div>

    <button class="btn-warn" onclick="limpiar()">Escanear otra HR</button>
  </div>

  <div id="mensaje"></div>

<script>
  /****************************************************
   * CONFIGURACIÓN
   * Pegá acá tu URL de Apps Script y tu API_KEY
   ****************************************************/

  const API_URL = 'https://script.google.com/macros/s/AKfycbzfdCrajfR9GgvzS0OQw5MELi4ZvSAccCRX615Agp5dFgOGZxJscp5i_7jno9jFFMR2/exec';
  const API_KEY = 'CONTROLHR2026';


  /****************************************************
   * VARIABLES
   ****************************************************/

  let html5QrCode = null;
  let scannerActivo = false;

  let codigoActual = null;
  let hrActual = null;


  /****************************************************
   * INICIO
   ****************************************************/

  window.onload = function() {
    actualizarModo();
    configurarEnterManual();
    obtenerDatosIniciales();

    document.getElementById('largaDistanciaSalida').addEventListener('change', actualizarVisualLargaDistancia);
  };


  function configurarEnterManual() {
    const input = document.getElementById('busquedaManual');

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        buscarManual();
      }
    });
  }

  function actualizarVisualLargaDistancia() {
    const chk = document.getElementById('largaDistanciaSalida');
    const box = document.getElementById('boxLargaDistancia');

    if (!chk || !box) return;

    if (chk.checked) {
      box.classList.add('activo');
    } else {
      box.classList.remove('activo');
    }
  }


  /****************************************************
   * API JSONP
   ****************************************************/

  function apiCall(action, params = {}) {
  return new Promise(function(resolve, reject) {
    const callbackName = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
    let terminado = false;

    const query = new URLSearchParams();
    query.set('api', '1');
    query.set('key', API_KEY);
    query.set('action', action);
    query.set('callback', callbackName);
    query.set('_', Date.now());

    Object.keys(params).forEach(function(k) {
      query.set(k, params[k] == null ? '' : String(params[k]));
    });

    const script = document.createElement('script');

    const timer = setTimeout(function() {
      if (terminado) return;

      terminado = true;

      try {
        delete window[callbackName];

        if (script && script.parentNode) {
          script.parentNode.removeChild(script);
        }
      } catch (e) {}

      const err = new Error('TIMEOUT_APPS_SCRIPT');
      err.esTimeout = true;
      reject(err);
    }, 45000);

    window[callbackName] = function(data) {
      if (terminado) return;

      terminado = true;
      clearTimeout(timer);

      try {
        delete window[callbackName];

        if (script && script.parentNode) {
          script.parentNode.removeChild(script);
        }
      } catch (e) {}

      resolve(data);
    };

    script.async = true;
    script.src = API_URL.trim() + '?' + query.toString();

    script.onerror = function() {
      console.warn('Advertencia: evento onerror del script JSONP.');
    };

    document.body.appendChild(script);
  });
}

  /****************************************************
   * DATOS INICIALES
   ****************************************************/

  function obtenerDatosIniciales() {
    mostrarMensaje('Conectando con la planilla...', '');

    apiCall('datosIniciales')
      .then(function(res) {
        if (!res.ok) {
          mostrarMensaje(res.mensaje || 'No se pudieron cargar los datos iniciales.', 'error');
          return;
        }

        cargarSelect('choferReal', res.choferes || []);
        cargarSelect('vueltaReal', res.vueltas || []);
        cargarSelect('estadoRetornoInput', res.estadosRetorno || []);

        mostrarMensaje('App lista para usar.', 'ok');
      })
      .catch(function(err) {
        mostrarMensaje(err.message, 'error');
      });
  }


  function cargarSelect(id, lista) {
    const sel = document.getElementById(id);
    sel.innerHTML = '';

    const vistos = new Set();

    lista.forEach(function(valor) {
      const texto = String(valor || '').trim();

      if (!texto) return;
      if (vistos.has(texto)) return;

      vistos.add(texto);

      const opt = document.createElement('option');
      opt.value = texto;
      opt.textContent = texto;
      sel.appendChild(opt);
    });
  }


  /****************************************************
   * MODO
   ****************************************************/

  function actualizarModo() {
    const modo = document.getElementById('modo').value;

    document.getElementById('panelSalida').classList.add('hidden');
    document.getElementById('panelRetorno').classList.add('hidden');
    document.getElementById('panelCancelarSalida').classList.add('hidden');
    document.getElementById('panelIncidencia').classList.add('hidden');

    if (modo === 'SALIDA') {
      document.getElementById('panelSalida').classList.remove('hidden');
    }

    if (modo === 'RETORNO') {
      document.getElementById('panelRetorno').classList.remove('hidden');
    }

    if (modo === 'CANCELAR_SALIDA') {
      document.getElementById('panelCancelarSalida').classList.remove('hidden');
    }

    if (modo === 'INCIDENCIA') {
      document.getElementById('panelIncidencia').classList.remove('hidden');
    }
  }


  /****************************************************
   * ESCÁNER QR
   ****************************************************/

  function iniciarScanner() {
    mostrarMensaje('Iniciando cámara...', '');

    document.getElementById('busquedaManual').blur();

    if (document.activeElement) {
      document.activeElement.blur();
    }

    const reader = document.getElementById('reader');
    reader.innerHTML = '';

    if (scannerActivo) {
      mostrarMensaje('La cámara ya está activa.', '');
      return;
    }

    html5QrCode = new Html5Qrcode('reader');

    const config = {
      fps: 10,
      qrbox: { width: 250, height: 250 }
    };

    html5QrCode.start(
      { facingMode: 'environment' },
      config,
      function(decodedText) {
        detenerScanner(false).then(function() {
          buscarCodigo(decodedText);
        });
      },
      function(errorMessage) {
        // No mostramos errores de lectura continua.
      }
    ).then(function() {
      scannerActivo = true;
      mostrarMensaje('Cámara activa. Apuntá al QR.', 'ok');
    }).catch(function(err) {
      scannerActivo = false;
      html5QrCode = null;
      document.getElementById('reader').innerHTML = '';

      mostrarMensaje(
        'No se pudo abrir la cámara. Revisá permisos del navegador. Error: ' + err,
        'error'
      );
    });
  }


  function detenerScanner(mostrar) {
    return new Promise(function(resolve) {
      if (!html5QrCode || !scannerActivo) {
        scannerActivo = false;
        html5QrCode = null;

        if (mostrar !== false) {
          mostrarMensaje('La cámara no está activa.', '');
        }

        resolve();
        return;
      }

      html5QrCode.stop().then(function() {
        scannerActivo = false;

        try {
          html5QrCode.clear();
        } catch (e) {}

        html5QrCode = null;
        document.getElementById('reader').innerHTML = '';

        if (mostrar !== false) {
          mostrarMensaje('Cámara detenida.', '');
        }

        resolve();
      }).catch(function(err) {
        scannerActivo = false;
        html5QrCode = null;
        document.getElementById('reader').innerHTML = '';
        resolve();
      });
    });
  }


  /****************************************************
   * BÚSQUEDA
   ****************************************************/

  function buscarManual() {
    const codigo = document.getElementById('busquedaManual').value.trim();

    document.getElementById('busquedaManual').blur();

    if (!codigo) {
      mostrarMensaje('Escribí una HR o TokenQR.', 'error');
      return;
    }

    buscarCodigo(codigo);
  }


  function buscarCodigo(codigo) {
    mostrarMensaje('Buscando hoja de ruta...', '');

    apiCall('buscarHR', {
      codigo: codigo
    }).then(function(res) {
      if (!res.ok) {
        mostrarMensaje(res.mensaje || 'No encontré la HR.', 'error');
        return;
      }

      mostrarDatos(res);
    }).catch(function(err) {
      mostrarMensaje(err.message, 'error');
    });
  }


  function mostrarDatos(res) {
    codigoActual = res.token || res.hr;
    hrActual = res.hr;

    document.getElementById('hr').textContent = res.hr || '(sin cargar)';
    document.getElementById('hrSalida').value = res.hr || '';

    document.getElementById('largaDistanciaSalida').checked =
      String(res.largaDistancia || '').trim().toUpperCase() === 'SI';
    
    actualizarVisualLargaDistancia();

    document.getElementById('choferPlanificado').textContent = res.choferPlanificado || '';
    document.getElementById('vueltaPlanificada').textContent = normalizarVueltaPantalla(res.vueltaPlanificada);
    document.getElementById('estadoActual').textContent = res.estadoActual || '';
    document.getElementById('choferSalida').textContent = res.choferSalida || '';
    document.getElementById('vueltaSalida').textContent = normalizarVueltaPantalla(res.vueltaSalida);
    document.getElementById('horaSalida').textContent = res.horaSalida || '';
    document.getElementById('horaRetorno').textContent = res.horaRetorno || '';
    document.getElementById('estadoRetorno').textContent = res.estadoRetorno || '';

    seleccionarValor('choferReal', res.choferSalida || res.choferPlanificado);
    seleccionarValor('vueltaReal', normalizarVueltaPantalla(res.vueltaSalida || res.vueltaPlanificada));

    generarAlertas(res);

    document.getElementById('cardDatos').classList.remove('hidden');

    actualizarModo();

    mostrarMensaje('HR encontrada. Revisá los datos y confirmá.', 'ok');
  }


  function normalizarVueltaPantalla(valor) {
    if (valor === null || valor === undefined) return '';

    const texto = String(valor).trim();

    const matchIso = texto.match(/^(\d{4})-(\d{2})-(\d{2})T/);

    if (matchIso) {
      const mes = String(Number(matchIso[2]));
      const dia = String(Number(matchIso[3]));
      return dia + '-' + mes;
    }

    return texto;
  }


  function seleccionarValor(id, valor) {
    if (valor === null || valor === undefined || valor === '') return;

    let texto = String(valor).trim();

    if (id === 'vueltaReal') {
      texto = normalizarVueltaPantalla(texto);

      const vueltasPermitidas = ['1', '2', '3', '1-2'];

      if (!vueltasPermitidas.includes(texto)) {
        texto = '1';
      }
    }

    const sel = document.getElementById(id);
    let existe = false;

    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === texto) {
        existe = true;
        break;
      }
    }

    if (!existe && id !== 'vueltaReal') {
      const opt = document.createElement('option');
      opt.value = texto;
      opt.textContent = texto;
      sel.appendChild(opt);
      existe = true;
    }

    if (existe) {
      sel.value = texto;
    }
  }


  function generarAlertas(res) {
    let html = '';
    const estado = String(res.estadoActual || '').trim().toUpperCase();

    if (estado === 'PENDIENTE_SALIDA' || estado === '') {
      html += '<div class="alerta">Pendiente de salida. Completá o corregí los datos y confirmá.</div>';
    }

    if (estado === 'EN CALLE') {
      html += '<div class="alerta">Atención: esta HR ya figura EN CALLE.</div>';
    }

    if (estado === 'RETORNADA') {
      html += '<div class="alerta">Atención: esta HR ya figura RETORNADA.</div>';
    }

    if (estado === 'SALIDA_CANCELADA') {
      html += '<div class="alerta">Atención: esta HR tiene la salida cancelada. Puede volver a salir si corresponde.</div>';
    }

    if (estado === 'INCIDENCIA') {
      html += '<div class="alerta">Atención: esta HR está en INCIDENCIA.</div>';
    }

    if (res.choferSalida && res.choferPlanificado && res.choferSalida !== res.choferPlanificado) {
      html += '<div class="alerta">Chofer real distinto al planificado.</div>';
    }

    if (res.vueltaSalida && res.vueltaPlanificada && res.vueltaSalida !== res.vueltaPlanificada) {
      html += '<div class="alerta">Vuelta real distinta a la planificada.</div>';
    }

    document.getElementById('alertas').innerHTML = html;
  }


   let accionEnCurso = false;

function bloquearAcciones(bloquear) {
  const botones = document.querySelectorAll('#cardDatos button');

  botones.forEach(function(btn) {
    btn.disabled = bloquear;
  });
}

function iniciarAccion(texto) {
  if (accionEnCurso) {
    mostrarMensaje('Ya hay una acción en curso. Esperá a que termine antes de volver a tocar.', 'error');
    return false;
  }

  accionEnCurso = true;
  bloquearAcciones(true);
  mostrarMensaje(texto, '');

  return true;
}

function finalizarAccion() {
  accionEnCurso = false;
  bloquearAcciones(false);
}

function esTimeoutAppsScript(err) {
  return err && (err.esTimeout || err.message === 'TIMEOUT_APPS_SCRIPT');
}

function verificarAccionTrasTimeout(tipoAccion) {
  mostrarMensaje(
    'Apps Script está tardando. Verificando automáticamente si la acción se registró...',
    ''
  );

  return new Promise(function(resolve) {
    setTimeout(function() {
      apiCall('buscarHR', {
        codigo: codigoActual
      }).then(function(res) {
        if (!res.ok) {
          mostrarMensaje(
            'No pude verificar la HR después de la demora. Revisá la planilla antes de volver a confirmar. ' +
            (res.mensaje || ''),
            'error'
          );
          resolve(false);
          return;
        }

        const estado = String(res.estadoActual || '').trim().toUpperCase();
        const estadoRetorno = String(res.estadoRetorno || '').trim().toUpperCase();

        let accionConfirmada = false;
        let mensajeOk = '';

        if (tipoAccion === 'SALIDA' && estado === 'EN CALLE') {
          accionConfirmada = true;
          mensajeOk = 'Salida registrada correctamente. Apps Script respondió tarde, pero la planilla ya quedó actualizada.';
        }

        if (tipoAccion === 'RETORNO' && estado === 'RETORNADA') {
          accionConfirmada = true;
          mensajeOk = 'Retorno registrado correctamente. Apps Script respondió tarde, pero la planilla ya quedó actualizada.';
        }

        if (tipoAccion === 'CANCELAR_SALIDA' && estado === 'SALIDA_CANCELADA') {
          accionConfirmada = true;
          mensajeOk = 'Salida cancelada correctamente. Apps Script respondió tarde, pero la planilla ya quedó actualizada.';
        }

        if (tipoAccion === 'INCIDENCIA' && estado === 'INCIDENCIA') {
          accionConfirmada = true;
          mensajeOk = 'Incidencia registrada correctamente. Apps Script respondió tarde, pero la planilla ya quedó actualizada.';
        }

        if (accionConfirmada) {
          mostrarMensaje(mensajeOk, 'ok');
          limpiar();
          resolve(true);
          return;
        }

        mostrarDatos(res);

        mostrarMensaje(
          'No pude confirmar que la acción se haya registrado. Revisá los datos que aparecen en pantalla. ' +
          'Si siguen igual, recién ahí volvé a intentar.',
          'error'
        );

        resolve(false);

      }).catch(function(err) {
        mostrarMensaje(
          'No pude verificar la HR después de la demora. Revisá la planilla antes de volver a confirmar. ' +
          (err.message || ''),
          'error'
        );
        resolve(false);
      });
    }, 3000);
  });
}

function manejarErrorAccion(err, tipoAccion) {
  if (esTimeoutAppsScript(err)) {
    verificarAccionTrasTimeout(tipoAccion)
      .then(function() {
        finalizarAccion();
      });

    return;
  }

  mostrarMensaje(err.message || 'Ocurrió un error al registrar la acción.', 'error');
  finalizarAccion();
} 

  /****************************************************
   * REGISTROS
   ****************************************************/

  function confirmarSalida() {
    if (!codigoActual) {
      mostrarMensaje('Primero escaneá o buscá una HR.', 'error');
      return;
    }

    const estadoActual = String(document.getElementById('estadoActual').textContent || '').trim().toUpperCase();

    const estadosBloqueadosSalida = [
      'EN CALLE',
      'RETORNADA',
      'INCIDENCIA'
    ];

    if (estadosBloqueadosSalida.includes(estadoActual)) {
      mostrarMensaje(
        'No se puede registrar salida. Estado actual: ' + estadoActual,
        'error'
      );
      return;
    }

    const hr = document.getElementById('hrSalida').value.trim();
    const chofer = document.getElementById('choferReal').value;
    const vuelta = document.getElementById('vueltaReal').value;
    const largaDistancia = document.getElementById('largaDistanciaSalida').checked ? 'SI' : '';
    const observacion = document.getElementById('observacionSalida').value;

    if (!hr) {
      mostrarMensaje('Cargá el número de HR.', 'error');
      return;
    }

    if (!chofer) {
      mostrarMensaje('Seleccioná un chofer.', 'error');
      return;
    }

    if (!vuelta) {
      mostrarMensaje('Seleccioná una vuelta.', 'error');
      return;
    }


    if (!iniciarAccion('Registrando salida...')) return;

    apiCall('registrarSalida', {
      codigo: codigoActual,
      hr: hr,
      chofer: chofer,
      vuelta: vuelta,
      largaDistancia: largaDistancia,
      observacion: observacion
    }).then(function(res) {
      if (!res.ok) {
        mostrarMensaje(res.mensaje || 'No se pudo registrar salida.', 'error');
        finalizarAccion();
        return;
      }

      mostrarMensaje(res.mensaje, 'ok');
      finalizarAccion();
      limpiar();

    }).catch(function(err) {
      manejarErrorAccion(err, 'SALIDA');
    });
  }


  function confirmarSalidaRapida() {
    // Compatibilidad: si quedó algún botón viejo en caché, usa la misma salida normal.
    confirmarSalida();
  }


  function confirmarCancelarSalida() {
    if (!codigoActual) {
      mostrarMensaje('Primero escaneá o buscá una HR.', 'error');
      return;
    }

    const observacion = document.getElementById('observacionCancelarSalida').value.trim();

    if (!observacion) {
      mostrarMensaje('Escribí el motivo de cancelación de salida.', 'error');
      return;
    }


    if (!iniciarAccion('Cancelando salida...')) return;

    apiCall('registrarCancelarSalida', {
      codigo: codigoActual,
      observacion: observacion
    }).then(function(res) {
      if (!res.ok) {
        mostrarMensaje(res.mensaje || 'No se pudo cancelar la salida.', 'error');
        finalizarAccion();
        return;
      }

      mostrarMensaje(res.mensaje, 'ok');
      finalizarAccion();
      limpiar();

    }).catch(function(err) {
      manejarErrorAccion(err, 'CANCELAR_SALIDA');
    });
  }


  function confirmarRetorno() {
    if (!codigoActual) {
      mostrarMensaje('Primero escaneá o buscá una HR.', 'error');
      return;
    }

    const estadoActual = String(document.getElementById('estadoActual').textContent || '').trim().toUpperCase();

    if (estadoActual !== 'EN CALLE') {
      mostrarMensaje('No se puede registrar retorno. La HR debe estar EN CALLE. Estado actual: ' + estadoActual,
      'error');
    return;
  }

    if (!iniciarAccion('Registrando retorno...')) return;

    apiCall('registrarRetorno', {
      codigo: codigoActual,
      estadoRetorno: document.getElementById('estadoRetornoInput').value,
      observacion: document.getElementById('observacionRetorno').value
    }).then(function(res) {
      if (!res.ok) {
        mostrarMensaje(res.mensaje || 'No se pudo registrar retorno.', 'error');
        finalizarAccion();
        return;
      }

      mostrarMensaje(res.mensaje, 'ok');
      finalizarAccion();
      limpiar();

    }).catch(function(err) {
      manejarErrorAccion(err, 'RETORNO');
    });
  }


  function confirmarIncidencia() {
    if (!codigoActual) {
      mostrarMensaje('Primero escaneá o buscá una HR.', 'error');
      return;
    }

    const observacion = document.getElementById('observacionIncidencia').value.trim();

    if (!observacion) {
      mostrarMensaje('Escribí una observación de incidencia.', 'error');
      return;
    }

    if (!iniciarAccion('Registrando incidencia...')) return;

    apiCall('registrarIncidencia', {
      codigo: codigoActual,
      observacion: observacion
    }).then(function(res) {
      if (!res.ok) {
        mostrarMensaje(res.mensaje || 'No se pudo registrar incidencia.', 'error');
        finalizarAccion();
        return;
      }

      mostrarMensaje(res.mensaje, 'ok');
      finalizarAccion();
      limpiar();

    }).catch(function(err) {
      manejarErrorAccion(err, 'INCIDENCIA');
    });
  }


  /****************************************************
   * LIMPIEZA
   ****************************************************/

  function limpiar() {
    codigoActual = null;
    hrActual = null;

    document.getElementById('cardDatos').classList.add('hidden');

    const inputManual = document.getElementById('busquedaManual');
    inputManual.value = '';
    inputManual.blur();

    document.getElementById('hrSalida').value = '';
    document.getElementById('observacionSalida').value = '';
    document.getElementById('largaDistanciaSalida').checked = false;
    actualizarVisualLargaDistancia();
    document.getElementById('observacionRetorno').value = '';
    document.getElementById('observacionCancelarSalida').value = '';
    document.getElementById('observacionIncidencia').value = '';
    document.getElementById('alertas').innerHTML = '';
  }


  function mostrarMensaje(texto, tipo) {
    const div = document.getElementById('mensaje');
    div.className = 'card ' + tipo;
    div.innerHTML = texto;
  }
</script>
